name: Build Spaces Renamer

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Bundle (spaces-renamer)
      run: |
        xcodebuild build \
          -project spaces-renamer.xcodeproj \
          -scheme spaces-renamer \
          -configuration Release \
          -destination 'platform=macOS' \
          MACOSX_DEPLOYMENT_TARGET=11.0 \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

    - name: Build App (SpacesRenamer) - No Signing
      run: |
        xcodebuild build \
          -project spaces-renamer.xcodeproj \
          -scheme SpacesRenamer \
          -configuration Release \
          -destination 'platform=macOS' \
          MACOSX_DEPLOYMENT_TARGET=11.0 \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE_SPECIFIER=""

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Built-Products-Tahoe
        path: |
          ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release/spaces-renamer.bundle
          ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release/SpacesRenamer.app
