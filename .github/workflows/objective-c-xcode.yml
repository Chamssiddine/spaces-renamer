name: Build Spaces Renamer

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Bundle (spaces-renamer target)
      run: |
        xcodebuild build \
          -project spaces-renamer.xcodeproj \
          -scheme spaces-renamer \
          -configuration Release \
          -destination 'platform=macOS'

    - name: Build App (SpacesRenamer target)
      run: |
        xcodebuild build \
          -project spaces-renamer.xcodeproj \
          -scheme SpacesRenamer \
          -configuration Release \
          -destination 'platform=macOS'

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Built Products
        path: |
          build/Release/spaces-renamer.bundle
          build/Release/SpacesRenamer.app
